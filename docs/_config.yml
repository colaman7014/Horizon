theme: jekyll-theme-cayman
title: 每日新聞彙整
description: 每日彙整完成的科技與財經新聞
baseurl: "/Horizon" # the subpath of your site, e.g. /blog
url: "https://colaman7014.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
